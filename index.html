<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>알파벳 리듬 게임</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes beatFlash {
      0%, 100% { background: #eee; }
      50% { background: #ffeb3b; }
    }

    @keyframes beatPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #root {
      width: 100%;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 유사 발음 매핑 사전 (음성 인식기의 한계 보완)
    const phoneticMap = {
      'A': ['A', '에이', 'AY', 'EIGHT'],
      'B': ['B', '비', 'BEE', 'BE'],
      'C': ['C', '씨', '시', 'SEE', 'SEA'],
      'D': ['D', '디', 'DEE'],
      'E': ['E', '이', 'EE'],
      'F': ['F', '에프', 'EF', 'HALF'],
      'G': ['G', '지', 'GEE'],
      'H': ['H', '에이치', '에이취', 'EIGHTCH', 'ITCH'],
      'I': ['I', '아이', 'EYE'],
      'J': ['J', '제이', 'JAY'],
      'K': ['K', '케이', 'KAY', 'OKAY'],
      'L': ['L', '엘', 'EL'],
      'M': ['M', '엠', 'EM'],
      'N': ['N', '엔', 'EN', 'AND'],
      'O': ['O', '오', 'OH', 'OWE'],
      'P': ['P', '피', 'PEE', 'PEA'],
      'Q': ['Q', '큐', 'CUE', 'QUEUE'],
      'R': ['R', '알', '아르', 'AR', 'ARE'],
      'S': ['S', '에스', 'ES', 'YES'],
      'T': ['T', '티', 'TEE', 'TEA'],
      'U': ['U', '유', 'YOU'],
      'V': ['V', '브이', '비', 'VEE'],
      'W': ['W', '더블유', 'DOUBLE YOU', 'DOUBLE'],
      'X': ['X', '엑스', 'EX'],
      'Y': ['Y', '와이', 'WHY'],
      'Z': ['Z', '지', '제트', 'ZEE', 'ZED']
    };

    const AlphabetRhythmGame = () => {
      const [gameState, setGameState] = useState('start');
      const [difficulty, setDifficulty] = useState(null);
      const [currentAlphabetIndex, setCurrentAlphabetIndex] = useState(0);
      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0);
      const [maxCombo, setMaxCombo] = useState(0);
      const [results, setResults] = useState([]);
      const [gameStartTime, setGameStartTime] = useState(null);
      const [gameStats, setGameStats] = useState([]);
      const [isListening, setIsListening] = useState(false);

      const audioContextRef = useRef(null);
      const beatTimeRef = useRef(0);
      const isPlayingRef = useRef(false);
      const recognitionRef = useRef(null);
      const recognizingStatusRef = useRef(false);

      const alphabets = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const bpmMap = { easy: 60, normal: 120, hard: 160 };
      const beatInterval = difficulty ? (60000 / bpmMap[difficulty]) : 0;

      const pronunciationGuide = {
        A: 'ay (에이)', B: 'bee (비)', C: 'see (씨)', D: 'dee (디)',
        E: 'ee (이)', F: 'ef (에프)', G: 'gee (지)', H: 'aitch (에이취)',
        I: 'eye (아이)', J: 'jay (제이)', K: 'kay (케이)', L: 'el (엘)',
        M: 'em (엠)', N: 'en (엔)', O: 'oh (오)', P: 'pee (피)',
        Q: 'cue (큐)', R: 'ar (알)', S: 'es (에스)', T: 'tee (티)',
        U: 'you (유)', V: 'vee (비)', W: 'double-you (더블유)', X: 'ex (엑스)',
        Y: 'why (와이)', Z: 'zee (지)'
      };

      const initializeAudio = () => {
        if (!audioContextRef.current) {
          audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioContextRef.current.state === 'suspended') {
          audioContextRef.current.resume();
        }
        return audioContextRef.current;
      };

      const playBeat = () => {
        try {
          const audioContext = initializeAudio();
          const now = audioContext.currentTime;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          
          osc.connect(gain);
          gain.connect(audioContext.destination);
          
          osc.frequency.value = 800;
          osc.type = 'sine';
          
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          
          osc.start(now);
          osc.stop(now + 0.1);
        } catch (e) {
          console.error("Audio playback failed", e);
        }
      };

      const playSuccessSound = () => {
        try {
          const audioContext = initializeAudio();
          const now = audioContext.currentTime;
          const osc = audioContext.createOscillator();
          const gain = audioContext.createGain();
          
          osc.connect(gain);
          gain.connect(audioContext.destination);
          
          osc.frequency.setValueAtTime(600, now);
          osc.frequency.linearRampToValueAtTime(800, now + 0.1);
          osc.type = 'sine';
          
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
          
          osc.start(now);
          osc.stop(now + 0.1);
        } catch (e) {
          console.error("Audio playback failed", e);
        }
      };

      const checkCorrectness = (transcript, targetAlphabet) => {
        const words = transcript.toUpperCase().trim().split(' ');
        const validMatchWords = phoneticMap[targetAlphabet] || [targetAlphabet];
        
        // 인식된 텍스트 중 하나라도 매핑 사전과 일치하면 정답
        return words.some(word => validMatchWords.includes(word)) || transcript.includes(targetAlphabet);
      };

      const startGame = (diff) => {
        initializeAudio();
        setDifficulty(diff);
        setGameState('playing');
        setCurrentAlphabetIndex(0);
        setScore(0);
        setCombo(0);
        setMaxCombo(0);
        setResults([]);
        setGameStartTime(Date.now());
        isPlayingRef.current = true;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.interimResults = false;
          // 한글/영문 동시 인식을 위해 언어 설정 조정
          recognitionRef.current.lang = 'en-US';
        }
        
        playBeat();
        beatTimeRef.current = Date.now();
      };

      const safeStartRecognition = () => {
        if (!recognitionRef.current || !isPlayingRef.current) return;
        
        if (recognizingStatusRef.current) {
          recognitionRef.current.stop();
        }

        try {
          recognitionRef.current.start();
        } catch (error) {
          console.warn('Speech Recognition already started', error);
        }
      };

      const handleGameLoop = (currentAlphabet) => {
        if (!recognitionRef.current) return;

        recognitionRef.current.onstart = () => {
          setIsListening(true);
          recognizingStatusRef.current = true;
        };

        recognitionRef.current.onresult = (event) => {
          const transcript = event.results[0][0].transcript;
          processResult(transcript, currentAlphabet);
        };

        recognitionRef.current.onerror = (event) => {
          // No-speech 에러가 나면 오답 처리 후 넘어감
          if(event.error === 'no-speech') {
              processResult("", currentAlphabet);
          } else {
              setIsListening(false);
              recognizingStatusRef.current = false;
              if (isPlayingRef.current) {
                 setTimeout(() => triggerNextRound(), 300);
              }
          }
        };

        recognitionRef.current.onend = () => {
          setIsListening(false);
          recognizingStatusRef.current = false;
        };

        safeStartRecognition();
      };

      const processResult = (transcript, currentAlphabet) => {
        setIsListening(false);
        recognizingStatusRef.current = false;

        const isCorrect = checkCorrectness(transcript, currentAlphabet);
        const timeSinceBeat = Date.now() - beatTimeRef.current;
        const isTimingPerfect = Math.abs(timeSinceBeat - beatInterval) < 300; // 웹 환경을 고려해 타이밍 관대하게 조정
        const isTimingGood = Math.abs(timeSinceBeat - beatInterval) < 600;
        
        let points = 0;
        if (isCorrect) {
          if (isTimingPerfect) points = 10;
          else if (isTimingGood) points = 5;
          else points = 3; // 맞히기만 해도 기본 점수 부여
          playSuccessSound();
        }

        setResults(prev => [...prev, {
          alphabet: currentAlphabet,
          correct: isCorrect,
          points: points,
          heard: transcript
        }]);

        setScore(prev => prev + points);
        
        if (points > 0) {
          setCombo(prev => {
            const newCombo = prev + 1;
            setMaxCombo(m => Math.max(m, newCombo));
            return newCombo;
          });
        } else {
          setCombo(0);
        }

        setTimeout(() => triggerNextRound(), 300);
      };

      const triggerNextRound = () => {
        if (!isPlayingRef.current) return;

        setCurrentAlphabetIndex(prev => {
          const nextIndex = prev + 1;
          if (nextIndex < alphabets.length) {
            playBeat();
            beatTimeRef.current = Date.now();
            return nextIndex;
          } else {
            endGame();
            return prev;
          }
        });
      };

      const endGame = () => {
        isPlayingRef.current = false;
        if (recognitionRef.current && recognizingStatusRef.current) {
            recognitionRef.current.stop();
        }
        
        // 상태 업데이트 지연 문제를 해결하기 위해 함수형 콜백 대신 기존 상태 사용
        setResults(currentResults => {
          const accuracy = currentResults.length > 0 
            ? Math.round((currentResults.filter(r => r.correct).length / currentResults.length) * 100)
            : 0;
          
          setScore(currentScore => {
            const timeTaken = Math.round((Date.now() - gameStartTime) / 1000);
            const gameRecord = {
              score: currentScore,
              accuracy: accuracy,
              maxCombo: maxCombo,
              difficulty: difficulty,
              timeTaken: timeTaken,
              date: new Date().toLocaleDateString('ko-KR')
            };

            const saved = JSON.parse(localStorage.getItem('gameStats') || '[]');
            localStorage.setItem('gameStats', JSON.stringify([...saved, gameRecord]));
            
            return currentScore;
          });

          return currentResults;
        });

        setGameState('result');
      };

      useEffect(() => {
        const saved = JSON.parse(localStorage.getItem('gameStats') || '[]');
        setGameStats(saved);
        
        return () => {
          isPlayingRef.current = false;
          if (recognitionRef.current && recognizingStatusRef.current) {
            recognitionRef.current.stop();
          }
        };
      }, []);

      useEffect(() => {
        if (gameState === 'playing' && isPlayingRef.current) {
           const timer = setTimeout(() => {
             handleGameLoop(alphabets[currentAlphabetIndex]);
           }, beatInterval / 2);
           
           return () => clearTimeout(timer);
        }
      }, [gameState, currentAlphabetIndex]);

      const getGrade = (score) => {
        if (score >= 250) return { grade: 'A+', message: '완벽해요! 정말 훌륭해요! 🌟', color: '#fa709a' };
        if (score >= 200) return { grade: 'A', message: '아주 잘했어요! 👏', color: '#ffa726' };
        if (score >= 150) return { grade: 'B', message: '좋아요! 더 연습하면 더 잘할 수 있어요! 💪', color: '#4caf50' };
        if (score >= 100) return { grade: 'C', message: '괜찮아요! 한 번 더 해볼까요? 🎮', color: '#1976d2' };
        if (score >= 50) return { grade: 'D', message: '다시 도전해봐요! 화이팅! ⚡', color: '#ab47bc' };
        return { grade: 'F', message: '아쉬워요. 천천히 시도해보세요. 🐢', color: '#757575' };
      };

      const StartScreen = () => (
        <div style={styles.card}>
          <div style={{ fontSize: '4rem', textAlign: 'center', marginBottom: '1rem', animation: 'bounce 2s infinite' }}>🎤</div>
          <h1 style={styles.title}>알파벳 리듬</h1>
          <p style={styles.subtitle}>Alphabet Beat Game</p>
          
          <p style={{ fontSize: '1.1rem', color: '#666', margin: '2rem 0', lineHeight: '1.8', textAlign: 'center' }}>
            🎵 리듬에 맞춰<br/>
            🎤 영어 알파벳을 발음하세요!<br/>
            🌟 정확한 발음 = 더 높은 점수
          </p>

          <button 
            onClick={() => setGameState('difficulty')}
            style={{ ...styles.primaryButton, width: '100%' }}
          >
            🚀 게임 시작하기
          </button>
        </div>
      );

      const DifficultyScreen = () => (
        <div style={styles.card}>
          <h2 style={styles.screenTitle}>난이도를 선택하세요</h2>
          
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '1.5rem', marginBottom: '2rem' }}>
            <div
              onClick={() => startGame('easy')}
              style={{ padding: '2rem', background: 'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)', borderRadius: '16px', cursor: 'pointer', transition: 'transform 0.2s', border: '3px solid transparent' }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-5px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
            >
              <div style={{ fontSize: '2.5rem', textAlign: 'center', marginBottom: '1rem' }}>🐢</div>
              <h3 style={{ textAlign: 'center', color: 'white', fontSize: '1.3rem', margin: '0', fontWeight: '700' }}>쉬움 (Easy)</h3>
            </div>

            <div
              onClick={() => startGame('normal')}
              style={{ padding: '2rem', background: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', borderRadius: '16px', cursor: 'pointer', transition: 'transform 0.2s', border: '3px solid transparent' }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-5px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
            >
              <div style={{ fontSize: '2.5rem', textAlign: 'center', marginBottom: '1rem' }}>🎸</div>
              <h3 style={{ textAlign: 'center', color: 'white', fontSize: '1.3rem', margin: '0', fontWeight: '700' }}>보통 (Normal)</h3>
            </div>

            <div
              onClick={() => startGame('hard')}
              style={{ padding: '2rem', background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', borderRadius: '16px', cursor: 'pointer', transition: 'transform 0.2s', border: '3px solid transparent' }}
              onMouseEnter={(e) => e.currentTarget.style.transform = 'translateY(-5px)'}
              onMouseLeave={(e) => e.currentTarget.style.transform = 'translateY(0)'}
            >
              <div style={{ fontSize: '2.5rem', textAlign: 'center', marginBottom: '1rem' }}>⚡</div>
              <h3 style={{ textAlign: 'center', color: 'white', fontSize: '1.3rem', margin: '0', fontWeight: '700' }}>어려움 (Hard)</h3>
            </div>
          </div>

          <button 
            onClick={() => setGameState('start')}
            style={styles.secondaryButton}
          >
            ← 돌아가기
          </button>
        </div>
      );

      const GameplayScreen = () => {
        const currentAlphabet = alphabets[currentAlphabetIndex];
        const progress = ((currentAlphabetIndex) / alphabets.length) * 100;
        
        return (
          <div style={styles.card}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2rem' }}>
              <div>
                <p style={{ fontSize: '0.9rem', color: '#999', margin: '0' }}>현재 난이도</p>
                <h3 style={{ fontSize: '1.5rem', color: '#667eea', margin: '0', fontWeight: '700' }}>
                  {difficulty === 'easy' ? '쉬움 (Easy)' : difficulty === 'normal' ? '보통 (Normal)' : '어려움 (Hard)'}
                </h3>
              </div>
              <button 
                onClick={() => {
                  isPlayingRef.current = false;
                  if(recognitionRef.current) recognitionRef.current.stop();
                  setGameState('start');
                }}
                style={styles.pauseButton}
              >
                ⏸️ 중단하기
              </button>
            </div>

            <div style={{ marginBottom: '2rem' }}>
              <p style={{ fontSize: '0.9rem', color: '#666', margin: '0 0 0.5rem' }}>진행도: {currentAlphabetIndex + 1}/26</p>
              <div style={{ height: '12px', background: '#eee', borderRadius: '6px', overflow: 'hidden' }}>
                <div style={{ height: '100%', width: `${progress}%`, background: 'linear-gradient(90deg, #667eea, #764ba2)', transition: 'width 0.3s' }}></div>
              </div>
            </div>

            <div style={{ textAlign: 'center', margin: '3rem 0' }}>
              <p style={{ fontSize: '0.9rem', color: '#999', margin: '0' }}>지금 발음할 알파벳</p>
              <div style={{ fontSize: '5rem', fontWeight: '900', color: '#667eea', margin: '1rem 0', letterSpacing: '10px', animation: 'pulse 0.6s ease-in-out infinite' }}>
                 {currentAlphabet}
              </div>
              <p style={{ fontSize: '1.1rem', color: '#666', margin: '0' }}>{pronunciationGuide[currentAlphabet]}</p>
            </div>

            <div style={{ background: '#f0f4ff', padding: '1.5rem', borderRadius: '12px', margin: '2rem 0', borderLeft: '4px solid #667eea' }}>
              <p style={{ fontSize: '0.85rem', color: '#666', margin: '0 0 0.5rem', fontWeight: '600' }}>🎤 음성 인식 상태</p>
              <p style={{ fontSize: '1.1rem', color: '#667eea', margin: '0', fontWeight: '700' }}>
                {isListening ? '인식 중... 말씀해주세요!' : '준비됨'}
              </p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', margin: '2rem 0' }}>
              <div style={{ background: '#fff3e0', padding: '1rem', borderRadius: '12px', border: '2px solid #ffa726' }}>
                <p style={{ fontSize: '0.85rem', color: '#999', margin: '0' }}>현재 점수</p>
                <p style={{ fontSize: '2rem', color: '#ffa726', margin: '0', fontWeight: '700' }}>{score}</p>
              </div>
              <div style={{ background: '#f3e5f5', padding: '1rem', borderRadius: '12px', border: '2px solid #ab47bc' }}>
                <p style={{ fontSize: '0.85rem', color: '#999', margin: '0' }}>콤보</p>
                <p style={{ fontSize: '2rem', color: '#ab47bc', margin: '0', fontWeight: '700' }}>{combo} 🔥</p>
              </div>
            </div>

            <div style={{ background: '#f9f9f9', padding: '1.5rem', borderRadius: '12px' }}>
              <p style={{ fontSize: '0.9rem', color: '#666', margin: '0 0 1rem', fontWeight: '600' }}>최근 결과</p>
              <div style={{ display: 'flex', gap: '0.5rem', flexWrap: 'wrap' }}>
                {results.slice(-8).map((r, i) => (
                  <span
                    key={i}
                    style={{
                      padding: '6px 12px',
                      background: r.correct ? '#c8e6c9' : '#ffccbc',
                      color: r.correct ? '#2e7d32' : '#d84315',
                      borderRadius: '20px',
                      fontSize: '0.85rem',
                      fontWeight: '600'
                    }}
                    title={`인식된 소리: ${r.heard || '없음'}`}
                  >
                    {r.alphabet} {r.correct ? '✓' : '✗'}
                  </span>
                ))}
              </div>
            </div>
          </div>
        );
      };

      const ResultScreen = () => {
        const accuracy = results.length > 0 
          ? Math.round((results.filter(r => r.correct).length / results.length) * 100)
          : 0;
        const gradeInfo = getGrade(score);
        
        return (
          <div style={styles.card}>
            <div style={{ fontSize: '3rem', textAlign: 'center', marginBottom: '1rem', animation: 'bounce 0.6s ease-out' }}>🎉</div>
            <h2 style={styles.resultTitle}>게임 완료!</h2>

            <div style={{ background: `linear-gradient(135deg, ${gradeInfo.color} 0%, #764ba2 100%)`, padding: '2rem', borderRadius: '16px', margin: '2rem 0', textAlign: 'center', color: 'white' }}>
              <p style={{ color: 'rgba(255,255,255,0.8)', margin: '0 0 0.5rem', fontSize: '0.9rem', fontWeight: '600' }}>최종 등급</p>
              <div style={{ fontSize: '3rem', margin: '0', fontWeight: '900' }}>{gradeInfo.grade}</div>
              <p style={{ color: 'rgba(255,255,255,0.9)', margin: '0.5rem 0 0', fontSize: '1.1rem' }}>{gradeInfo.message}</p>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '1rem', margin: '2rem 0' }}>
              <div style={{ background: '#fff3e0', padding: '1.5rem', borderRadius: '12px', border: '2px solid #ffa726', textAlign: 'center' }}>
                <p style={{ fontSize: '0.8rem', color: '#999', margin: '0 0 0.5rem', fontWeight: '600' }}>최종 점수</p>
                <p style={{ fontSize: '2.2rem', color: '#ffa726', margin: '0', fontWeight: '800' }}>{score}</p>
              </div>
              <div style={{ background: '#f3e5f5', padding: '1.5rem', borderRadius: '12px', border: '2px solid #ab47bc', textAlign: 'center' }}>
                <p style={{ fontSize: '0.8rem', color: '#999', margin: '0 0 0.5rem', fontWeight: '600' }}>정확도</p>
                <p style={{ fontSize: '2.2rem', color: '#ab47bc', margin: '0', fontWeight: '800' }}>{accuracy}%</p>
              </div>
              <div style={{ background: '#c8e6c9', padding: '1.5rem', borderRadius: '12px', border: '2px solid #2e7d32', textAlign: 'center' }}>
                <p style={{ fontSize: '0.8rem', color: '#999', margin: '0 0 0.5rem', fontWeight: '600' }}>최대 콤보</p>
                <p style={{ fontSize: '2.2rem', color: '#2e7d32', margin: '0', fontWeight: '800' }}>{maxCombo} 🔥</p>
              </div>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginTop: '2rem' }}>
              <button 
                onClick={() => setGameState('difficulty')}
                style={{ ...styles.primaryButton, width: '100%' }}
              >
                🎮 다시 하기
              </button>
              <button 
                onClick={() => setGameState('stats')}
                style={{ ...styles.secondaryButton, width: '100%' }}
              >
                📊 통계보기
              </button>
            </div>
          </div>
        );
      };

      const StatsScreen = () => {
        const totalGames = gameStats.length;
        const avgScore = totalGames > 0 ? Math.round(gameStats.reduce((a, b) => a + b.score, 0) / totalGames) : 0;
        const maxScore = totalGames > 0 ? Math.max(...gameStats.map(s => s.score)) : 0;
        
        return (
          <div style={styles.card}>
            <h2 style={styles.screenTitle}>📊 나의 게임 통계</h2>

            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(150px, 1fr))', gap: '1rem', marginBottom: '2rem' }}>
              <div style={{ background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', padding: '1.5rem', borderRadius: '12px', textAlign: 'center', color: 'white' }}>
                <p style={{ fontSize: '0.85rem', margin: '0 0 0.5rem', opacity: 0.9 }}>총 게임 수</p>
                <p style={{ fontSize: '2.2rem', fontWeight: '800', margin: '0' }}>{totalGames}</p>
              </div>
              <div style={{ background: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)', padding: '1.5rem', borderRadius: '12px', textAlign: 'center', color: 'white' }}>
                <p style={{ fontSize: '0.85rem', margin: '0 0 0.5rem', opacity: 0.9 }}>평균 점수</p>
                <p style={{ fontSize: '2.2rem', fontWeight: '800', margin: '0' }}>{avgScore}</p>
              </div>
              <div style={{ background: 'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)', padding: '1.5rem', borderRadius: '12px', textAlign: 'center', color: 'white' }}>
                <p style={{ fontSize: '0.85rem', margin: '0 0 0.5rem', opacity: 0.9 }}>최고 점수</p>
                <p style={{ fontSize: '2.2rem', fontWeight: '800', margin: '0' }}>{maxScore}</p>
              </div>
            </div>

            <button 
              onClick={() => setGameState('start')}
              style={{ ...styles.secondaryButton, width: '100%', marginTop: '2rem' }}
            >
              ← 돌아가기
            </button>
          </div>
        );
      };

      return (
        <React.Fragment>
          {gameState === 'start' && <StartScreen />}
          {gameState === 'difficulty' && <DifficultyScreen />}
          {gameState === 'playing' && <GameplayScreen />}
          {gameState === 'result' && <ResultScreen />}
          {gameState === 'stats' && <StatsScreen />}
        </React.Fragment>
      );
    };

    const styles = {
      card: {
        background: 'white',
        borderRadius: '20px',
        padding: '3rem 2rem',
        boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
        width: '100%'
      },
      title: {
        fontSize: '3rem',
        textAlign: 'center',
        color: '#667eea',
        margin: '0 0 0.5rem',
        fontWeight: '800',
        letterSpacing: '-1px'
      },
      subtitle: {
        fontSize: '1.3rem',
        textAlign: 'center',
        color: '#764ba2',
        margin: '0.5rem 0',
        fontWeight: '600'
      },
      screenTitle: {
        textAlign: 'center',
        color: '#667eea',
        fontSize: '2rem',
        margin: '0 0 2rem',
        fontWeight: '800'
      },
      resultTitle: {
        color: '#667eea',
        fontSize: '2rem',
        margin: '0 0 1rem',
        textAlign: 'center',
        fontWeight: '800'
      },
      primaryButton: {
        padding: '16px 40px',
        fontSize: '1.2rem',
        background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
        color: 'white',
        border: 'none',
        borderRadius: '50px',
        cursor: 'pointer',
        fontWeight: '700',
        boxShadow: '0 10px 25px rgba(102, 126, 234, 0.4)',
        transition: 'transform 0.2s'
      },
      secondaryButton: {
        padding: '12px 24px',
        background: '#eee',
        color: '#333',
        border: 'none',
        borderRadius: '20px',
        cursor: 'pointer',
        fontWeight: '600'
      },
      pauseButton: {
        padding: '10px 20px',
        background: '#ff6b6b',
        color: 'white',
        border: 'none',
        borderRadius: '20px',
        cursor: 'pointer',
        fontWeight: '600'
      }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AlphabetRhythmGame />);
  </script>
</body>
</html>
